  # ---------------------------------------------------------------------------
  # CTD - Chemical Nodes
  # ---------------------------------------------------------------------------
  ctd.chemical_nodes:
    data_type: node
    node_type: Drug
    source_filename: chemical_nodes.tsv
    merge: true
    skip: false
