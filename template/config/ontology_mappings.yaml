# CardioKB Ontology Mapping Configuration
# Migrated from src/ontology_configs.py (Cardio-KB repo)
#
# Config keys use format: {source_name}.{data_name}
# IMPORTANT: All node entries must appear before relationship entries.
# ista matches relationships against already-loaded individuals, so any
# relationship processed before its subject/object nodes exist will silently
# produce zero edges.

mappings:

  # ===========================================================================
  # NODE POPULATIONS
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # NCBI Gene - Gene Information (loaded first; many relationships depend on it)
  # ---------------------------------------------------------------------------
  ncbigene.genes:
    data_type: node
    node_type: Gene
    source_filename: genes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: Symbol
      compound_fields:
        dbXrefs:
          delimiter: "|"
          field_split_prefix: ":"
      data_property_map:
        GeneID: xrefNcbiGene
        Symbol: geneSymbol
        type_of_gene: typeOfGene
        Full_name_from_nomenclature_authority: commonName
        xref_MIM: xrefOMIM
        xref_HGNC: xrefHGNC
        xref_Ensembl: xrefEnsembl
        chromosome: chromosome
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # DrugBank - Drug Information
  # ---------------------------------------------------------------------------
  drugbank.drugs:
    data_type: node
    node_type: Drug
    source_filename: drugs.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: drugbank_id
      data_property_map:
        drugbank_id: xrefDrugbank
        cas_number: xrefCasRN
        drug_name: commonName
        pubchem_cid: xrefPubChemCID
        chembl_id: xrefChembl
        source_database: sourceDatabase
      merge_column:
        source_column_name: cas_number
        data_property: xrefCasRN

  # ---------------------------------------------------------------------------
  # DoRothEA - Transcription Factors
  # ---------------------------------------------------------------------------
  # DoRothEA TranscriptionFactor node removed: TFs are Gene nodes.
  # Edge mapping below uses Gene→Gene directly via geneSymbol.

  # ---------------------------------------------------------------------------
  # ClinicalTrials.gov - Clinical Trial Nodes
  # ---------------------------------------------------------------------------
  clinicaltrials.trial_nodes:
    data_type: node
    node_type: ClinicalTrial
    source_filename: trial_nodes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: nct_id
      data_property_map:
        nct_id: trialId
        brief_title: commonName
        phase: phase
        status: status
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # ClinPGx - Drug Label Nodes
  # ---------------------------------------------------------------------------
  clinpgx.drug_label_nodes:
    data_type: node
    node_type: DrugLabel
    source_filename: drug_label_nodes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: guideline_id
      data_property_map:
        guideline_id: labelId
        guideline_name: commonName
        url: url
        version: version
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # Disease Ontology - Disease Nodes
  # ---------------------------------------------------------------------------
  disease_ontology.slim_terms:
    data_type: node
    node_type: Disease
    source_filename: slim_terms.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: doid
      data_property_map:
        doid: xrefDiseaseOntology
        disease_name: commonName
        definition: definition
        umls_cui: xrefUmlsCUI
        mesh_id: xrefMeSH
        efo_id: xrefEFO
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # Gene Ontology - Biological Process Nodes
  # ---------------------------------------------------------------------------
  gene_ontology.biological_process_nodes:
    data_type: node
    node_type: BiologicalProcess
    source_filename: biological_process_nodes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: go_id
      data_property_map:
        go_id: geneOntologyId
        name: commonName
        definition: definition

  # ---------------------------------------------------------------------------
  # Gene Ontology - Molecular Function Nodes
  # ---------------------------------------------------------------------------
  gene_ontology.molecular_function_nodes:
    data_type: node
    node_type: MolecularFunction
    source_filename: molecular_function_nodes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
