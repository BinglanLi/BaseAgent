        side_effect_name: commonName
        source_database: sourceDatabase

  # ---------------------------------------------------------------------------
  # DrugCentral - Drug and PharmacologicClass Nodes
  # ---------------------------------------------------------------------------
  drugcentral.drugs:
    data_type: node
    node_type: Drug
    source_filename: drugs.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: drugbank_id
      iri_fallback_column: struct_id
      iri_fallback_prefix: "DC:"
      data_property_map:
        drugbank_id: xrefDrugbank
        struct_id: xrefDrugCentral
        drug_name: commonName
        pubchem_cid: xrefPubChemCID
